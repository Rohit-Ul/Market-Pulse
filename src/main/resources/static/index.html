<!DOCTYPE html>
<html>
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
</head>
<body>
    <h1>🔔 Live Stock Alerts Dashboard 1</h1>
    <div id="alerts" style="height:500px;overflow-y:auto;border:2px solid #f44336;padding:15px;background:#fafafa;">

      <button onclick="testAlert()">🧪 Test Alert</button>
    </div>

    


    <script>

      function testAlert() {
    const testMsg = {userId: 'TEST', Response: {symbol: 'TEST', high: 999, alertType: 'Price'}};
    const div = document.createElement('div');
    div.innerHTML = `🧪 TEST WORKS!`;
    div.style.background = 'green';
    document.getElementById('alerts').insertBefore(div, document.getElementById('alerts').firstChild);
}
        const socket = new SockJS('/ws');
        const stompClient = Stomp.over(socket);
        
        stompClient.connect({}, function(frame) {
            console.log('✅ STOMP Connected:', frame);
            
            stompClient.subscribe('/topic/alerts', function(message) {
                const alert = JSON.parse(message.body);
                console.log('🚨 ALERT ARRIVED:', alert);
                
                // 🔥 EXACT MATCH for your JSON structure
                const div = document.createElement('div');
                div.innerHTML = `
                    <b>🚨 ${alert.Response.symbol}</b><br>
                    Price: ₹${alert.Response.high}+ | User: <b>${alert.userId}</b><br>
                    <small>${alert.Response.alertType}</small>
                `;
                div.style.cssText = `
                    color:#d32f2f; font-weight:bold; padding:12px; margin:8px 0; 
                    background:linear-gradient(90deg,#ffebee 0%,#ffcdd2 100%); 
                    border-left:5px solid #f44336; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.1)
                `;
                
                document.getElementById('alerts').insertBefore(div, document.getElementById('alerts').firstChild);
            });
        });
    </script>
</body>
</html>
